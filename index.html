
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dra. Nicoly Pimentel | Odontologia Especializada</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-rose: #f4dada;
            --dark-rose: #d4a5a5;
            --accent-rose: #b07d7d;
            --light-bg: #fffafa;
            --white: #ffffff;
            --text: #5a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--white);
            color: var(--text);
            line-height: 1.6;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
        }

        h1, h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            color: var(--accent-rose);
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(212, 165, 165, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            color: var(--accent-rose);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
        }

        .logo span { color: var(--dark-rose); }

        nav a {
            text-decoration: none;
            color: var(--text);
            margin-left: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: var(--dark-rose); }

        .hero {
            padding: 120px 8%;
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.3)), 
                        url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
            text-align: center;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
